name: Compile merj for macOS
on: [push] # Automatically fires every single time you push code modifications

jobs:
  build-mac:
    name: Build Native macOS Package Bundle
    runs-on: macos-latest # Boots a virtual Apple macOS machine runner in the cloud

    steps:
    - name: Checkout Source Code Project Files
      uses: actions/checkout@v4

    - name: Configure Python Infrastructure Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Packaging Tools
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Run PyInstaller macOS Build Routine
      run: |
        pyinstaller --onefile --windowed --name="merj" merj.py

    - name: Upload Finished Standalone Mac App Artifact
      uses: actions/upload-artifact@v4
      with:
        name: merj-macOS-Bundle
        path: dist/merj.app/ # Grabs the resulting .app package bundle directly
