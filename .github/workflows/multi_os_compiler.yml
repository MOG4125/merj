name: Compile merj for Mac and Linux
on: [push]

jobs:
  build:
    name: Build Native Standalone Package
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest] 

    steps:
    - name: Checkout Source Code Project Files
      uses: actions/checkout@v4

    - name: Configure Python Infrastructure Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Linux GUI Rendering Files
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk

    - name: Install System Packaging Tools
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pillow

    # MACOS BUILD ROUTINE: Uses --onedir to output a valid Apple .app package structure
    - name: Run PyInstaller macOS Build
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --onedir --windowed --clean --name="merj" merj.pyw

    # LINUX BUILD ROUTINE: Retains --onefile for standard linux desktop delivery
    - name: Run PyInstaller Linux Build
      if: matrix.os == 'ubuntu-latest'
      run: |
        pyinstaller --onefile --noconsole --clean --name="merj" merj.pyw

    - name: Upload Finished Standalone Mac App
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: merj-macOS-Bundle
        path: dist/merj.app

    - name: Upload Finished Standalone Linux Binary
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: merj-Linux-Binary
        path: dist/merj
