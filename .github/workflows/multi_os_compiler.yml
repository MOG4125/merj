name: Compile merj for Mac and Linux
on: [push] # Fires automatically every time you push code updates to GitHub

jobs:
  build:
    name: Build Native Standalone Package
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # matrix setup boots up both virtual systems in the cloud side-by-side
        os: [macos-latest, ubuntu-latest] 

    steps:
    - name: Checkout Source Code Project Files
      uses: actions/checkout@v4

    - name: Configure Python Infrastructure Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # SYSTEM PATCHING FOR LINUX INFRASTRUCTURE
    - name: Install Linux GUI Rendering Files
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk

    - name: Install System Packaging Tools
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Run PyInstaller Build Routine
      run: |
        pyinstaller --onefile --windowed --clean --name="merj" merj.pyw

    # UPLOAD AUTOMATION: PIPES LOGS DIRECTLY TO WEB DASHBOARD
    - name: Upload Finished Standalone Mac App
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: merj-macOS-Bundle
        path: dist/merj.app/ # Compiles into a clean .app folder bundle for Mac users

    - name: Upload Finished Standalone Linux Binary
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: merj-Linux-Binary
        path: dist/merj # Compiles into a clean extension-less executable file for Linux users
